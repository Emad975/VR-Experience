<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
<title>الذرة ثلاثية الأبعاد — EDAMA</title>
<link rel="stylesheet" href="css/portal.css"/>
<style>
html,body{height:100%;overflow:hidden}
#scene{position:fixed;inset:0;z-index:0}
#scene canvas{display:block}

/* ── floating header ── */
.hud-header{
  position:fixed;top:0;right:0;left:0;z-index:30;
  display:flex;align-items:center;gap:12px;
  padding:10px 18px;
  background:linear-gradient(180deg,rgba(4,7,20,.85),rgba(4,7,20,0));
  pointer-events:none;
}
.hud-header>*{pointer-events:auto}
.hud-back{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 14px;border-radius:10px;
  background:rgba(10,15,35,.6);border:1px solid rgba(255,255,255,.15);
  backdrop-filter:blur(10px);
  color:#cbd5e1;font-size:.85rem;font-weight:700;text-decoration:none;transition:all .18s;
}
.hud-back:hover{border-color:#60a5fa;color:#60a5fa}
.hud-title{font-size:1rem;font-weight:900;color:#e2e8f0}
.hud-title span{color:#60a5fa}

/* ── element picker (right side) ── */
.el-panel{
  position:fixed;top:64px;right:14px;z-index:20;
  width:230px;max-height:calc(100vh - 140px);
  display:flex;flex-direction:column;gap:10px;
}
.glass{
  background:rgba(8,12,30,.62);
  border:1px solid rgba(255,255,255,.12);
  border-radius:16px;
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
}
.el-nav{display:flex;align-items:center;gap:8px;padding:10px 12px}
.el-nav button{
  width:34px;height:34px;border-radius:9px;flex:0 0 auto;
  border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);
  color:#e2e8f0;font-size:1rem;font-weight:900;cursor:pointer;transition:all .15s;
}
.el-nav button:hover{border-color:#60a5fa;color:#60a5fa}
.el-nav select{
  flex:1;min-width:0;padding:7px 8px;border-radius:9px;
  background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.15);
  color:#e2e8f0;font-family:inherit;font-size:.85rem;font-weight:700;cursor:pointer;outline:none;
}
.el-chips{display:flex;flex-wrap:wrap;gap:6px;padding:0 12px 12px}
.el-chip{
  padding:4px 11px;border-radius:9px;font-size:.78rem;font-weight:900;cursor:pointer;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.13);color:#94a3b8;
  transition:all .15s;
}
.el-chip:hover,.el-chip.active{border-color:#60a5fa;color:#60a5fa;background:rgba(96,165,250,.12)}

/* ── info card ── */
.info-card{padding:16px;overflow-y:auto}
.ic-head{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.ic-sym{
  font-size:2.1rem;font-weight:900;line-height:1;
  width:64px;height:64px;border-radius:14px;flex:0 0 auto;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.35);border:2px solid var(--elc,#60a5fa);color:var(--elc,#60a5fa);
  text-shadow:0 0 18px var(--elc,#60a5fa);
}
.ic-names{min-width:0}
.ic-ar{font-size:1.15rem;font-weight:900;color:#f1f5f9}
.ic-en{font-size:.78rem;color:#94a3b8}
.ic-cat{display:inline-block;margin-top:4px;font-size:.68rem;font-weight:700;padding:2px 9px;border-radius:10px;background:rgba(255,255,255,.07);color:var(--elc,#94a3b8)}
.ic-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.ic-item{background:rgba(0,0,0,.3);border-radius:9px;padding:7px 9px;text-align:center}
.ic-l{font-size:.62rem;color:#64748b;margin-bottom:1px}
.ic-v{font-size:.92rem;font-weight:900;color:#e2e8f0}
.ic-shells{display:flex;align-items:center;justify-content:center;gap:7px;flex-wrap:wrap;background:rgba(0,0,0,.3);border-radius:9px;padding:8px;margin-bottom:10px}
.ic-shell{display:flex;flex-direction:column;align-items:center}
.ic-shell b{font-size:.95rem;color:#60a5fa}
.ic-shell i{font-style:normal;font-size:.58rem;color:#64748b}
.ic-desc{font-size:.76rem;color:#94a3b8;line-height:1.7}

/* ── bottom controls ── */
.ctl-bar{
  position:fixed;bottom:14px;right:50%;transform:translateX(50%);z-index:20;
  display:flex;gap:8px;align-items:center;
  padding:8px 12px;
}
.ctl-btn{
  padding:9px 16px;border-radius:11px;cursor:pointer;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);
  color:#cbd5e1;font-family:inherit;font-size:.82rem;font-weight:700;transition:all .15s;
  display:inline-flex;align-items:center;gap:6px;
}
.ctl-btn:hover{border-color:#60a5fa;color:#60a5fa}
.ctl-btn.on{border-color:#34d399;color:#34d399;background:rgba(52,211,153,.1)}

/* ── legend ── */
.legend{
  position:fixed;bottom:14px;left:14px;z-index:20;
  padding:10px 14px;font-size:.72rem;color:#94a3b8;
  display:flex;flex-direction:column;gap:5px;
}
.lg-row{display:flex;align-items:center;gap:7px}
.lg-dot{width:10px;height:10px;border-radius:50%;flex:0 0 auto}

/* ── hint toast ── */
.hint{
  position:fixed;top:70px;right:50%;transform:translateX(50%);z-index:25;
  padding:9px 18px;font-size:.8rem;color:#cbd5e1;font-weight:700;
  opacity:1;transition:opacity 1s;pointer-events:none;white-space:nowrap;
}
.hint.gone{opacity:0}

@media(max-width:640px){
  .el-panel{width:200px;right:8px;top:56px}
  .ic-desc{display:none}
  .legend{display:none}
  .hud-title{font-size:.85rem}
}
</style>
</head>
<body>

<div id="scene"></div>

<header class="hud-header">
  <a href="chemistry.html" class="hud-back">← رجوع</a>
  <div class="hud-title">⚛️ الذرة <span>ثلاثية الأبعاد</span> — EDAMA</div>
</header>

<div class="hint glass" id="hint">🖱️ اسحب للتدوير · عجلة الفأرة للتقريب · 📱 على الجوال: المس واسحب</div>

<div class="el-panel">
  <div class="glass">
    <div class="el-nav">
      <button id="btn-prev" title="العنصر السابق">‹</button>
      <select id="el-select"></select>
      <button id="btn-next" title="العنصر التالي">›</button>
    </div>
    <div class="el-chips" id="el-chips"></div>
  </div>
  <div class="glass info-card" id="info-card"></div>
</div>

<div class="ctl-bar glass">
  <button class="ctl-btn on" id="btn-spin">🔄 دوران تلقائي</button>
  <button class="ctl-btn" id="btn-gyro">📱 حساس الحركة</button>
  <button class="ctl-btn" id="btn-labels">🏷️ الأغلفة</button>
</div>

<div class="legend glass">
  <div class="lg-row"><span class="lg-dot" style="background:#ef4444;box-shadow:0 0 8px #ef4444"></span> بروتون (+)</div>
  <div class="lg-row"><span class="lg-dot" style="background:#94a3b8;box-shadow:0 0 8px #64748b"></span> نيوترون</div>
  <div class="lg-row"><span class="lg-dot" style="background:#fbbf24;box-shadow:0 0 8px #fbbf24"></span> إلكترون (−)</div>
</div>

<script src="js/vendor/three.min.js"></script>
<script src="js/vendor/OrbitControls.js"></script>
<script src="js/vendor/VRButton.js"></script>
<script src="js/elements3d.js"></script>
<script>
(function(){
'use strict';

/* ─────────── category colors & labels ─────────── */
var CAT={
  alkali:   ['#f87171','فلز قلوي'],
  alkaline: ['#fb923c','فلز قلوي ترابي'],
  trans:    ['#60a5fa','فلز انتقالي'],
  post:     ['#22d3ee','فلز بعد انتقالي'],
  metalloid:['#2dd4bf','شبه فلز'],
  nonmetal: ['#34d399','لافلز'],
  halogen:  ['#a3e635','هالوجين'],
  noble:    ['#a78bfa','غاز نبيل'],
  lanthanide:['#f472b6','لانثانيد'],
  actinide: ['#e879f9','أكتينيد'],
  unknown:  ['#94a3b8','غير مصنف']
};
function catOf(e){return CAT[e[5]]||CAT.unknown;}

/* ─────────── three.js scene ─────────── */
var container=document.getElementById('scene');
var renderer=new THREE.WebGLRenderer({antialias:true,alpha:false});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.xr.enabled=true;
container.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer,{
  enter:'🥽 دخول الواقع الافتراضي',exit:'خروج من VR',
  notSupported:'VR غير مدعوم على هذا الجهاز',notSecure:'VR يتطلب HTTPS'
}));

var scene=new THREE.Scene();
scene.background=new THREE.Color(0x04061a);
scene.fog=new THREE.FogExp2(0x04061a,0.02);

var camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,.1,200);
camera.position.set(0,4,16);

/* camera rig so VR + orbit coexist */
var rig=new THREE.Group();
rig.add(camera);
scene.add(rig);

var controls=new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;
controls.dampingFactor=.06;
controls.minDistance=4;
controls.maxDistance=60;

/* lights */
scene.add(new THREE.AmbientLight(0x334466,1.2));
var keyLight=new THREE.PointLight(0xffffff,1.1,120);
keyLight.position.set(18,22,14);
scene.add(keyLight);
var coreLight=new THREE.PointLight(0xff5544,1.4,40); /* glow from nucleus */
scene.add(coreLight);

/* starfield */
(function(){
  var n=1600,pos=new Float32Array(n*3);
  for(var i=0;i<n;i++){
    var r=60+Math.random()*80,th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1);
    pos[i*3]=r*Math.sin(ph)*Math.cos(th);
    pos[i*3+1]=r*Math.sin(ph)*Math.sin(th);
    pos[i*3+2]=r*Math.cos(ph);
  }
  var g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.BufferAttribute(pos,3));
  var m=new THREE.PointsMaterial({color:0x8899cc,size:.35,sizeAttenuation:true,transparent:true,opacity:.8});
  scene.add(new THREE.Points(g,m));
})();

/* soft glow sprite texture (radial gradient) */
function glowTexture(inner,outer){
  var cv=document.createElement('canvas');cv.width=cv.height=128;
  var c=cv.getContext('2d');
  var g=c.createRadialGradient(64,64,4,64,64,64);
  g.addColorStop(0,inner);g.addColorStop(.35,outer);g.addColorStop(1,'rgba(0,0,0,0)');
  c.fillStyle=g;c.fillRect(0,0,128,128);
  var t=new THREE.CanvasTexture(cv);
  return t;
}
var nucleusGlowTex=glowTexture('rgba(255,180,140,.9)','rgba(255,80,60,.25)');
var electronGlowTex=glowTexture('rgba(255,240,180,.95)','rgba(251,191,36,.3)');

/* shared geometries / materials */
var sphereGeo=new THREE.SphereGeometry(1,18,14);
var protonMat=new THREE.MeshStandardMaterial({color:0xef4444,roughness:.35,metalness:.15,emissive:0x661111});
var neutronMat=new THREE.MeshStandardMaterial({color:0x9aa4b2,roughness:.5,metalness:.25,emissive:0x222730});
var electronMat=new THREE.MeshStandardMaterial({color:0xfbbf24,roughness:.25,metalness:.1,emissive:0x7a5a00});

/* the atom */
var atom=new THREE.Group();
scene.add(atom);

var electrons=[]; /* {pivot, mesh, speed} */
var shellRings=[];
var labelSprites=[];
var showLabels=false;

function clearAtom(){
  while(atom.children.length)atom.remove(atom.children[0]);
  electrons=[];shellRings=[];labelSprites=[];
}

/* cluster N points tightly inside a sphere (nucleus packing) */
function packNucleus(count,spread){
  var pts=[],i,p,tries;
  for(i=0;i<count;i++){
    tries=0;
    do{
      p=new THREE.Vector3(
        (Math.random()*2-1),(Math.random()*2-1),(Math.random()*2-1)
      );
      tries++;
    }while(p.lengthSq()>1&&tries<20);
    p.normalize().multiplyScalar(Math.pow(Math.random(),1/3)*spread);
    pts.push(p);
  }
  return pts;
}

function makeTextSprite(text,color){
  var cv=document.createElement('canvas');cv.width=256;cv.height=96;
  var c=cv.getContext('2d');
  c.font='900 52px Tajawal, Arial';
  c.textAlign='center';c.textBaseline='middle';
  c.shadowColor=color;c.shadowBlur=18;
  c.fillStyle=color;
  c.fillText(text,128,48);
  var t=new THREE.CanvasTexture(cv);
  var m=new THREE.SpriteMaterial({map:t,transparent:true,depthWrite:false});
  var s=new THREE.Sprite(m);
  s.scale.set(3.4,1.27,1);
  return s;
}

function buildAtom(e){
  clearAtom();
  var Z=e[0],shells=e[6],neutrons=e[7];
  var col=catOf(e)[0];

  /* nucleus size grows gently with mass */
  var A=Z+neutrons;
  var nucleusR=.55+Math.pow(A,1/3)*.22;

  var nuc=new THREE.Group();
  var parts=packNucleus(Math.min(A,290),nucleusR);
  var pr=.34+Math.min(A,80)*.001;
  for(var i=0;i<parts.length;i++){
    /* deterministic mix keeps proton/neutron ratio correct at any size */
    var mesh=new THREE.Mesh(sphereGeo,(i*7919%A)<Z?protonMat:neutronMat);
    mesh.position.copy(parts[i]);
    mesh.scale.setScalar(pr);
    nuc.add(mesh);
  }
  /* nucleus glow */
  var glow=new THREE.Sprite(new THREE.SpriteMaterial({map:nucleusGlowTex,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending}));
  glow.scale.setScalar(nucleusR*7);
  nuc.add(glow);
  atom.add(nuc);
  atom.userData.nucleus=nuc;

  /* electron shells */
  var baseR=nucleusR+2.2,gap=1.55;
  for(var s=0;s<shells.length;s++){
    var count=shells[s],r=baseR+s*gap;

    /* shell ring (visual orbit guide) */
    var ringGeo=new THREE.TorusGeometry(r,.012,8,128);
    var ringMat=new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:.32});
    /* electrons of one shell share one tilted plane, each shell tilted differently */
    var plane=new THREE.Group();
    plane.rotation.x=s*.62;
    plane.rotation.y=s*.45;
    var ring=new THREE.Mesh(ringGeo,ringMat);
    plane.add(ring);
    shellRings.push(ring);

    /* shell label */
    var lbl=makeTextSprite('غلاف '+(s+1)+' — '+count+'e⁻',col);
    lbl.position.set(r+1.5,0,0);
    lbl.visible=showLabels;
    plane.add(lbl);
    labelSprites.push(lbl);

    for(var k=0;k<count;k++){
      var pivot=new THREE.Group();
      pivot.rotation.z=(k/count)*Math.PI*2;
      var em=new THREE.Mesh(sphereGeo,electronMat);
      em.scale.setScalar(.22);
      em.position.set(r,0,0);
      /* electron glow */
      var eg=new THREE.Sprite(new THREE.SpriteMaterial({map:electronGlowTex,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending}));
      eg.scale.setScalar(1.5);
      em.add(eg);
      pivot.add(em);
      plane.add(pivot);
      electrons.push({pivot:pivot,speed:(.55-s*.08)*(k%2?1:1.13)});
    }
    atom.add(plane);
  }

  /* fit camera distance to atom size */
  var maxR=baseR+(shells.length-1)*gap+4;
  controls.maxDistance=maxR*4;
  var want=maxR*1.9;
  if(!renderer.xr.isPresenting){
    var dir=camera.position.clone().normalize();
    if(dir.lengthSq()<.5)dir.set(0,.3,1).normalize();
    camera.position.copy(dir.multiplyScalar(want));
  }
}

/* ─────────── info panel & element selection ─────────── */
var current=0; /* index into EL3D */
var sel=document.getElementById('el-select');
EL3D.forEach(function(e,i){
  var o=document.createElement('option');
  o.value=i;o.textContent=e[0]+' — '+e[1]+' '+e[2];
  sel.appendChild(o);
});
sel.onchange=function(){setElement(+sel.value);};

var QUICK=[1,6,8,11,26,29,79,92]; /* H C O Na Fe Cu Au U */
var chipsBox=document.getElementById('el-chips');
QUICK.forEach(function(z){
  var e=EL3D[z-1];
  var c=document.createElement('span');
  c.className='el-chip';c.textContent=e[1];c.title=e[2];
  c.onclick=function(){setElement(z-1);};
  c.dataset.z=z;
  chipsBox.appendChild(c);
});

function fillInfo(e){
  var cat=catOf(e);
  var card=document.getElementById('info-card');
  card.style.setProperty('--elc',cat[0]);
  var sh='';
  e[6].forEach(function(n,i){
    sh+='<div class="ic-shell"><b>'+n+'</b><i>غ'+(i+1)+'</i></div>';
  });
  card.innerHTML=
    '<div class="ic-head">'+
      '<div class="ic-sym">'+e[1]+'</div>'+
      '<div class="ic-names"><div class="ic-ar">'+e[2]+'</div><div class="ic-en">'+e[3]+'</div>'+
      '<span class="ic-cat">'+cat[1]+'</span></div>'+
    '</div>'+
    '<div class="ic-grid">'+
      '<div class="ic-item"><div class="ic-l">العدد الذري</div><div class="ic-v">'+e[0]+'</div></div>'+
      '<div class="ic-item"><div class="ic-l">الكتلة</div><div class="ic-v">'+e[4]+'</div></div>'+
      '<div class="ic-item"><div class="ic-l">بروتونات</div><div class="ic-v" style="color:#ef4444">'+e[0]+'</div></div>'+
      '<div class="ic-item"><div class="ic-l">نيوترونات</div><div class="ic-v" style="color:#94a3b8">'+e[7]+'</div></div>'+
    '</div>'+
    '<div class="ic-shells">'+sh+'</div>'+
    (e[8]?'<div class="ic-desc">'+e[8]+'</div>':'');
}

function setElement(i){
  current=(i+EL3D.length)%EL3D.length;
  var e=EL3D[current];
  sel.value=current;
  document.querySelectorAll('.el-chip').forEach(function(c){
    c.classList.toggle('active',+c.dataset.z===e[0]);
  });
  fillInfo(e);
  buildAtom(e);
}

document.getElementById('btn-prev').onclick=function(){setElement(current-1);};
document.getElementById('btn-next').onclick=function(){setElement(current+1);};
window.addEventListener('keydown',function(ev){
  if(ev.key==='ArrowRight')setElement(current-1);
  else if(ev.key==='ArrowLeft')setElement(current+1);
});

/* ─────────── controls: autospin / gyro / labels ─────────── */
var autoSpin=true;
document.getElementById('btn-spin').onclick=function(){
  autoSpin=!autoSpin;this.classList.toggle('on',autoSpin);
};

var gyroOn=false,gyroBase=null;
function onGyro(ev){
  if(!gyroOn||ev.beta===null)return;
  if(!gyroBase)gyroBase={b:ev.beta,g:ev.gamma};
  var db=(ev.beta-gyroBase.b)*Math.PI/180;
  var dg=(ev.gamma-gyroBase.g)*Math.PI/180;
  atom.rotation.x=db*.8;
  atom.rotation.y=dg*1.2;
}
document.getElementById('btn-gyro').onclick=function(){
  var btn=this;
  if(gyroOn){
    gyroOn=false;gyroBase=null;btn.classList.remove('on');
    window.removeEventListener('deviceorientation',onGyro);
    return;
  }
  function start(){
    gyroOn=true;gyroBase=null;btn.classList.add('on');
    window.addEventListener('deviceorientation',onGyro);
  }
  /* iOS requires explicit permission */
  if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){
    DeviceOrientationEvent.requestPermission().then(function(st){if(st==='granted')start();}).catch(function(){});
  }else start();
};

document.getElementById('btn-labels').onclick=function(){
  showLabels=!showLabels;this.classList.toggle('on',showLabels);
  labelSprites.forEach(function(l){l.visible=showLabels;});
};

/* hide hint after a few seconds */
setTimeout(function(){document.getElementById('hint').classList.add('gone');},5000);

/* ─────────── VR placement ─────────── */
renderer.xr.addEventListener('sessionstart',function(){
  /* bring the atom to a comfortable spot in front of the viewer */
  atom.position.set(0,1.5,-3.5);
  atom.scale.setScalar(.22);
  controls.enabled=false;
});
renderer.xr.addEventListener('sessionend',function(){
  atom.position.set(0,0,0);
  atom.scale.setScalar(1);
  controls.enabled=true;
});

/* ─────────── resize & loop ─────────── */
window.addEventListener('resize',function(){
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

var clock=new THREE.Clock();
renderer.setAnimationLoop(function(){
  var dt=Math.min(clock.getDelta(),.05);
  var t=clock.elapsedTime;

  for(var i=0;i<electrons.length;i++)
    electrons[i].pivot.rotation.z+=electrons[i].speed*dt*2;

  if(atom.userData.nucleus){
    atom.userData.nucleus.rotation.y+=dt*.4;
    atom.userData.nucleus.rotation.x=Math.sin(t*.5)*.1;
  }
  if(autoSpin&&!gyroOn)atom.rotation.y+=dt*.12;

  coreLight.intensity=1.25+Math.sin(t*2.4)*.25;

  controls.update();
  renderer.render(scene,camera);
});

/* start with Carbon — pretty and familiar */
setElement(5);

})();
</script>
</body>
</html>
