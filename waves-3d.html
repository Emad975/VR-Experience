<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
<title>تراكب الموجات الغامر — EDAMA</title>
<link rel="stylesheet" href="css/portal.css"/>
<link rel="stylesheet" href="css/xrlab.css"/>
</head>
<body>

<div id="scene"></div>

<header class="hud-header">
  <a href="math.html" class="hud-back">← رجوع</a>
  <div class="hud-title">〰️ تراكب الموجات <span>الغامر</span></div>
  <a href="trig-waves.html" class="hud-2d">📊 الوضع المبسّط 2D</a>
</header>

<div class="hint glass" id="hint">موجتان تسافران أمامك — والموجة الذهبية في الأسفل هي مجموعهما</div>

<div class="side-panel">
  <div class="glass sp-section">
    <div class="sp-title">الموجة الأولى 🟢</div>
    <div class="sp-row">
      <span class="sp-name">السعة</span>
      <input class="sp-slider" type="range" id="a1" min="0" max="2" step="0.1" value="1"/>
      <span class="sp-val" id="a1v">1</span>
    </div>
    <div class="sp-row">
      <span class="sp-name">التردد</span>
      <input class="sp-slider" type="range" id="f1" min="0.5" max="3" step="0.1" value="1"/>
      <span class="sp-val" id="f1v">1</span>
    </div>
    <div class="sp-title">الموجة الثانية 🔵</div>
    <div class="sp-row">
      <span class="sp-name">السعة</span>
      <input class="sp-slider" type="range" id="a2" min="0" max="2" step="0.1" value="1"/>
      <span class="sp-val" id="a2v">1</span>
    </div>
    <div class="sp-row">
      <span class="sp-name">التردد</span>
      <input class="sp-slider" type="range" id="f2" min="0.5" max="3" step="0.1" value="1"/>
      <span class="sp-val" id="f2v">1</span>
    </div>
    <div class="sp-row">
      <span class="sp-name">الطور φ</span>
      <input class="sp-slider" type="range" id="ph" min="0" max="360" step="5" value="0"/>
      <span class="sp-val" id="phv">0°</span>
    </div>
  </div>

  <div class="glass sp-section">
    <div class="sp-title">تجارب جاهزة</div>
    <div class="sp-tabs" style="flex-wrap:wrap">
      <button class="sp-tab" id="pre-con">تداخل بنّاء</button>
      <button class="sp-tab" id="pre-des">تداخل هدّام</button>
    </div>
    <div class="sp-tabs" style="flex-wrap:wrap">
      <button class="sp-tab" id="pre-beat">ضربات</button>
      <button class="sp-tab" id="pre-stand">موجة واقفة</button>
    </div>
    <div id="pre-msg" style="margin-top:6px;font-size:.73rem;font-weight:700;text-align:center;color:#94a3b8;line-height:1.7"></div>
  </div>
</div>

<div class="ctl-bar glass">
  <button class="ctl-btn on" id="btn-anim">▶ الحركة</button>
  <button class="ctl-btn" id="btn-rev">⇄ الثانية بالاتجاه المعاكس</button>
</div>

<script src="js/vendor/three.min.js"></script>
<script src="js/vendor/OrbitControls.js"></script>
<script src="js/vendor/VRButton.js"></script>
<script src="js/xrlab.js"></script>
<script>
(function(){
'use strict';

var lab=XRLab.init({cameraPos:[7,4.5,10],target:[0,2.6,0],maxDistance:40});
var scene=lab.scene;

var XMIN=-8,XMAX=8,N=240;
var ROWS=[
  {z:2.2,y:4.4,color:0x34d399,glow:false},  /* wave 1 */
  {z:0,  y:4.4,color:0x60a5fa,glow:false},  /* wave 2 */
  {z:-2.2,y:1.6,color:0xfbbf24,glow:true}   /* sum */
];
var lines=[],glowLines=[];

ROWS.forEach(function(r,i){
  var pos=new Float32Array(N*3);
  var g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.BufferAttribute(pos,3));
  var l=new THREE.Line(g,new THREE.LineBasicMaterial({color:r.color,transparent:true,opacity:.95}));
  scene.add(l);
  lines.push(l);
  /* second slightly offset copy to fake thickness on the sum wave */
  if(r.glow){
    var g2=new THREE.BufferGeometry();
    g2.setAttribute('position',new THREE.BufferAttribute(new Float32Array(N*3),3));
    var l2=new THREE.Line(g2,new THREE.LineBasicMaterial({color:r.color,transparent:true,opacity:.4}));
    scene.add(l2);
    glowLines.push(l2);
  }
  /* axis rail */
  var rail=new THREE.Line(
    new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(XMIN,r.y,r.z),new THREE.Vector3(XMAX,r.y,r.z)]),
    new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:.14})
  );
  scene.add(rail);
});

/* labels */
var l1=lab.textSprite('الموجة 1','#34d399',.42);l1.position.set(XMAX+1.3,ROWS[0].y,ROWS[0].z);scene.add(l1);
var l2=lab.textSprite('الموجة 2','#60a5fa',.42);l2.position.set(XMAX+1.3,ROWS[1].y,ROWS[1].z);scene.add(l2);
var l3=lab.textSprite('المجموع','#fbbf24',.5);l3.position.set(XMAX+1.3,ROWS[2].y,ROWS[2].z);scene.add(l3);

/* plus and equals signs floating between rows */
var plus=lab.textSprite('+','#94a3b8',.6);plus.position.set(XMIN-1.2,(ROWS[0].y+ROWS[1].y)/2,(ROWS[0].z+ROWS[1].z)/2);scene.add(plus);
var eq=lab.textSprite('=','#94a3b8',.6);eq.position.set(XMIN-1.2,(ROWS[1].y+ROWS[2].y)/2,(ROWS[1].z+ROWS[2].z)/2);scene.add(eq);

var P={a1:1,f1:1,a2:1,f2:1,ph:0,rev:false};
var animate=true,tNow=0;

function wave1(x,t){return P.a1*Math.sin(P.f1*(x-2*t));}
function wave2(x,t){
  var dir=P.rev?1:-1;
  return P.a2*Math.sin(P.f2*(x+2*t*dir)+P.ph*Math.PI/180);
}

function updateLines(t){
  for(var r=0;r<3;r++){
    var pos=lines[r].geometry.attributes.position.array;
    for(var i=0;i<N;i++){
      var x=XMIN+(XMAX-XMIN)*i/(N-1);
      var v=r===0?wave1(x,t):r===1?wave2(x,t):wave1(x,t)+wave2(x,t);
      pos[i*3]=x;
      pos[i*3+1]=ROWS[r].y+v*(r===2?.75:.85);
      pos[i*3+2]=ROWS[r].z;
    }
    lines[r].geometry.attributes.position.needsUpdate=true;
  }
  if(glowLines.length){
    var src=lines[2].geometry.attributes.position.array;
    var dst=glowLines[0].geometry.attributes.position.array;
    for(var i=0;i<N*3;i++)dst[i]=src[i];
    for(var i=0;i<N;i++)dst[i*3+2]+=.06;
    glowLines[0].geometry.attributes.position.needsUpdate=true;
  }
}

lab.onFrame(function(dt){
  if(animate)tNow+=dt;
  updateLines(tNow);
});

/* ── UI ── */
function bind(id,key,suffix){
  document.getElementById(id).addEventListener('input',function(){
    P[key]=+this.value;
    document.getElementById(id+'v').textContent=this.value+(suffix||'');
  });
}
bind('a1','a1');bind('f1','f1');bind('a2','a2');bind('f2','f2');bind('ph','ph','°');

function setAll(a1,f1,a2,f2,ph,rev,msg){
  P.a1=a1;P.f1=f1;P.a2=a2;P.f2=f2;P.ph=ph;P.rev=rev;
  document.getElementById('a1').value=a1;document.getElementById('a1v').textContent=a1;
  document.getElementById('f1').value=f1;document.getElementById('f1v').textContent=f1;
  document.getElementById('a2').value=a2;document.getElementById('a2v').textContent=a2;
  document.getElementById('f2').value=f2;document.getElementById('f2v').textContent=f2;
  document.getElementById('ph').value=ph;document.getElementById('phv').textContent=ph+'°';
  document.getElementById('btn-rev').classList.toggle('on',rev);
  document.getElementById('pre-msg').textContent=msg;
  document.querySelectorAll('.sp-tab').forEach(function(t){t.classList.remove('active');});
}

document.getElementById('pre-con').onclick=function(){
  setAll(1,1,1,1,0,false,'موجتان متطابقتان → السعة تتضاعف (تداخل بنّاء)');
  this.classList.add('active');
};
document.getElementById('pre-des').onclick=function(){
  setAll(1,1,1,1,180,false,'فرق طور 180° → الموجتان تلغيان بعضهما (تداخل هدّام)');
  this.classList.add('active');
};
document.getElementById('pre-beat').onclick=function(){
  setAll(1,1.5,1,1.7,0,false,'ترددان متقاربان → ظاهرة الضربات: السعة تنتفخ وتنكمش');
  this.classList.add('active');
};
document.getElementById('pre-stand').onclick=function(){
  setAll(1,1,1,1,0,true,'موجتان متعاكستان → موجة واقفة: عُقَد ثابتة وبطون تهتز');
  this.classList.add('active');
};

document.getElementById('btn-anim').onclick=function(){
  animate=!animate;this.classList.toggle('on',animate);
};
document.getElementById('btn-rev').onclick=function(){
  P.rev=!P.rev;this.classList.toggle('on',P.rev);
};
lab.onSelect(function(){
  animate=!animate;
  document.getElementById('btn-anim').classList.toggle('on',animate);
});

updateLines(0);
setTimeout(function(){document.getElementById('hint').classList.add('gone');},5500);
})();
</script>
</body>
</html>
